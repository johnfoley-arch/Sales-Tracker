<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Account Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg: #1e293b;
      --sidebar-hover: #334155;
      --sidebar-active: #3b82f6;
      --panel-bg: #f8fafc;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-light: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #22c55e;
      --warning: #f59e0b;
      --archive-bg: #fefce8;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100vh;
      display: flex;
      background: var(--panel-bg);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--sidebar-bg);
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-header h1 span { font-size: 20px; }

    .add-account-form {
      padding: 12px 20px;
      display: flex;
      gap: 8px;
    }

    .add-account-form input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-account-form input::placeholder { color: rgba(255,255,255,0.4); }
    .add-account-form input:focus { border-color: var(--accent); }

    .add-account-form button {
      padding: 8px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .add-account-form button:hover { background: var(--accent-hover); }

    .account-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }

    .account-list::-webkit-scrollbar { width: 4px; }
    .account-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .account-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
      font-size: 14px;
      font-weight: 500;
    }

    .account-item:hover { background: var(--sidebar-hover); }
    .account-item.active { background: var(--sidebar-active); }

    .account-item .account-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .account-item .account-badge {
      background: rgba(255,255,255,0.15);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
      flex-shrink: 0;
    }

    .account-item.active .account-badge { background: rgba(255,255,255,0.25); }

    .account-item .delete-btn {
      opacity: 0;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      margin-left: 4px;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .account-item:hover .delete-btn { opacity: 1; }
    .account-item .delete-btn:hover { color: var(--danger); }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      text-align: center;
    }

    /* ── Main Content ── */
    .main-content {
      flex: 1;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      gap: 12px;
    }

    .empty-state .empty-icon { font-size: 48px; }
    .empty-state p { font-size: 16px; }

    /* ── Action Items Panel (center) ── */
    .actions-panel {
      flex: 1;
      min-width: 360px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: #fff;
    }

    .panel-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .panel-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-header h2 .icon { font-size: 18px; }

    .add-action-form {
      padding: 16px 24px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-bg);
    }

    .add-action-form input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .add-action-form input[type="text"]:focus { border-color: var(--accent); }

    .add-action-form input[type="date"] {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      background: #fff;
      color: var(--text-primary);
      transition: border-color 0.2s;
    }

    .add-action-form input[type="date"]:focus { border-color: var(--accent); }

    .add-action-form button {
      padding: 10px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .add-action-form button:hover { background: var(--accent-hover); }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }

    .tab-bar button {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab-bar button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-bar button:hover { color: var(--text-primary); }

    .actions-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .actions-list::-webkit-scrollbar { width: 5px; }
    .actions-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .action-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    .action-item:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(59,130,246,0.08); }

    .action-item.archived {
      background: var(--archive-bg);
      border-color: #fde68a;
      opacity: 0.75;
    }

    .action-item .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      margin-top: 2px;
      background: #fff;
    }

    .action-item .checkbox:hover { border-color: var(--success); }

    .action-item .checkbox.checked {
      background: var(--success);
      border-color: var(--success);
    }

    .action-item .checkbox.checked::after {
      content: '✓';
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .action-item .action-content { flex: 1; min-width: 0; }

    .action-item .action-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      word-wrap: break-word;
    }

    .action-item.archived .action-text {
      text-decoration: line-through;
      color: var(--text-light);
    }

    .action-item .action-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .action-item .action-date {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .action-item .action-date.overdue { color: var(--danger); font-weight: 600; }

    .action-item .completed-date { color: var(--success); }

    .action-item .delete-action {
      opacity: 0;
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .action-item:hover .delete-action { opacity: 1; }
    .action-item .delete-action:hover { color: var(--danger); }

    .no-items {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
      font-size: 14px;
    }

    .no-items .no-items-icon { font-size: 36px; margin-bottom: 8px; }

    /* ── Notes Panel (right) ── */
    .notes-panel {
      flex: 1.2;
      min-width: 380px;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    .conversations-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .conversations-header h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .conversations-header button {
      padding: 6px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .conversations-header button:hover { background: var(--accent-hover); }

    .conversations-list {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      background: var(--panel-bg);
    }

    .conversations-list::-webkit-scrollbar { height: 3px; }
    .conversations-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .conversation-tab {
      padding: 10px 18px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .conversation-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: #fff;
    }

    .conversation-tab:hover { color: var(--text-primary); }

    .conversation-tab .remove-conv {
      display: none;
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      margin-left: 2px;
    }

    .conversation-tab:hover .remove-conv { display: inline; }
    .conversation-tab .remove-conv:hover { color: var(--danger); }

    .note-editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .note-editor-area textarea {
      flex: 1;
      padding: 20px 24px;
      border: none;
      outline: none;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-primary);
      resize: none;
      font-family: 'Inter', sans-serif;
      background: #fff;
    }

    .note-editor-area textarea::placeholder { color: var(--text-light); }

    .note-footer {
      padding: 10px 24px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-light);
      display: flex;
      justify-content: space-between;
      background: var(--panel-bg);
    }

    /* ── Rename input ── */
    .rename-input {
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 4px;
      color: inherit;
      font-size: inherit;
      font-family: inherit;
      font-weight: inherit;
      padding: 2px 6px;
      outline: none;
      width: 120px;
    }

    /* ── Scrollbar for main ── */
    .actions-list::-webkit-scrollbar,
    .account-list::-webkit-scrollbar { width: 5px; }

    /* ── Responsive tweaks ── */
    @media (max-width: 900px) {
      .sidebar { width: 200px; min-width: 200px; }
      .actions-panel { min-width: 280px; }
      .notes-panel { min-width: 280px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar: Account List -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1><span>📊</span> Sales Tracker</h1>
    </div>
    <div class="add-account-form">
      <input type="text" id="newAccountName" placeholder="New account name…" />
      <button onclick="addAccount()">+ Add</button>
    </div>
    <div class="account-list" id="accountList"></div>
    <div class="sidebar-footer">Data saved locally in your browser</div>
  </div>

  <!-- Main Content -->
  <div class="main-content" id="mainContent">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🏢</div>
      <p>Select or create an account to get started</p>
    </div>
  </div>

  <script>
    // ── Data Layer ──
    const STORAGE_KEY = 'salesTrackerData';

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
      return { accounts: [], selectedAccountId: null };
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    let data = loadData();

    // ── Helpers ──
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function todayStr() {
      return new Date().toISOString().split('T')[0];
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function isOverdue(dateStr) {
      if (!dateStr) return false;
      return dateStr < todayStr();
    }

    function getAccount(id) {
      return data.accounts.find(a => a.id === id);
    }

    function getSelectedAccount() {
      return getAccount(data.selectedAccountId);
    }

    // ── Account Operations ──
    function addAccount() {
      const input = document.getElementById('newAccountName');
      const name = input.value.trim();
      if (!name) return;

      const account = {
        id: generateId(),
        name,
        actions: [],
        conversations: [{ id: generateId(), title: 'General', notes: '' }],
        activeConversationId: null,
        activeTab: 'active'
      };
      account.activeConversationId = account.conversations[0].id;

      data.accounts.push(account);
      data.selectedAccountId = account.id;
      input.value = '';
      saveData(data);
      render();
    }

    function selectAccount(id) {
      data.selectedAccountId = id;
      saveData(data);
      render();
    }

    function deleteAccount(id) {
      if (!confirm('Delete this account and all its data?')) return;
      data.accounts = data.accounts.filter(a => a.id !== id);
      if (data.selectedAccountId === id) {
        data.selectedAccountId = data.accounts.length > 0 ? data.accounts[0].id : null;
      }
      saveData(data);
      render();
    }

    // ── Action Item Operations ──
    function addAction() {
      const account = getSelectedAccount();
      if (!account) return;

      const textInput = document.getElementById('actionText');
      const dateInput = document.getElementById('actionDate');
      const text = textInput.value.trim();
      if (!text) return;

      account.actions.push({
        id: generateId(),
        text,
        dueDate: dateInput.value || null,
        completed: false,
        completedDate: null,
        createdDate: todayStr()
      });

      textInput.value = '';
      dateInput.value = '';
      saveData(data);
      renderActions(account);
      renderAccountList();
    }

    function toggleAction(accountId, actionId) {
      const account = getAccount(accountId);
      const action = account.actions.find(a => a.id === actionId);
      if (!action) return;

      action.completed = !action.completed;
      action.completedDate = action.completed ? todayStr() : null;

      saveData(data);
      renderActions(account);
      renderAccountList();
    }

    function deleteAction(accountId, actionId) {
      const account = getAccount(accountId);
      account.actions = account.actions.filter(a => a.id !== actionId);
      saveData(data);
      renderActions(account);
      renderAccountList();
    }

    // ── Conversation Operations ──
    function addConversation() {
      const account = getSelectedAccount();
      if (!account) return;

      const title = prompt('Conversation name:', `Meeting ${account.conversations.length + 1}`);
      if (!title || !title.trim()) return;

      const conv = { id: generateId(), title: title.trim(), notes: '' };
      account.conversations.push(conv);
      account.activeConversationId = conv.id;
      saveData(data);
      renderNotes(account);
    }

    function selectConversation(convId) {
      const account = getSelectedAccount();
      if (!account) return;
      account.activeConversationId = convId;
      saveData(data);
      renderNotes(account);
    }

    function removeConversation(convId) {
      const account = getSelectedAccount();
      if (!account || account.conversations.length <= 1) return;
      if (!confirm('Delete this conversation and its notes?')) return;

      account.conversations = account.conversations.filter(c => c.id !== convId);
      if (account.activeConversationId === convId) {
        account.activeConversationId = account.conversations[0].id;
      }
      saveData(data);
      renderNotes(account);
    }

    function renameConversation(convId) {
      const account = getSelectedAccount();
      const conv = account.conversations.find(c => c.id === convId);
      if (!conv) return;

      const tab = document.querySelector(`.conversation-tab[data-id="${convId}"] .conv-title`);
      const originalText = conv.title;

      const input = document.createElement('input');
      input.type = 'text';
      input.value = conv.title;
      input.className = 'rename-input';

      tab.replaceWith(input);
      input.focus();
      input.select();

      function finish() {
        const newName = input.value.trim() || originalText;
        conv.title = newName;
        saveData(data);
        renderNotes(account);
      }

      input.addEventListener('blur', finish);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') input.blur();
        if (e.key === 'Escape') { input.value = originalText; input.blur(); }
      });
    }

    function saveNotes() {
      const account = getSelectedAccount();
      if (!account) return;
      const conv = account.conversations.find(c => c.id === account.activeConversationId);
      if (!conv) return;
      const textarea = document.getElementById('noteTextarea');
      if (textarea) {
        conv.notes = textarea.value;
        saveData(data);
        updateNoteFooter(conv);
      }
    }

    function updateNoteFooter(conv) {
      const charCount = document.getElementById('charCount');
      if (charCount) {
        charCount.textContent = `${conv.notes.length} characters`;
      }
    }

    // ── Rendering ──
    function render() {
      renderAccountList();
      renderMainContent();
    }

    function renderAccountList() {
      const list = document.getElementById('accountList');
      list.innerHTML = '';

      data.accounts.forEach(account => {
        const activeCount = account.actions.filter(a => !a.completed).length;
        const isActive = account.id === data.selectedAccountId;

        const div = document.createElement('div');
        div.className = `account-item${isActive ? ' active' : ''}`;
        div.innerHTML = `
          <span class="account-name">${escapeHtml(account.name)}</span>
          ${activeCount > 0 ? `<span class="account-badge">${activeCount}</span>` : ''}
          <button class="delete-btn" onclick="event.stopPropagation(); deleteAccount('${account.id}')" title="Delete account">×</button>
        `;
        div.addEventListener('click', () => selectAccount(account.id));
        list.appendChild(div);
      });
    }

    function renderMainContent() {
      const main = document.getElementById('mainContent');
      const account = getSelectedAccount();

      if (!account) {
        main.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🏢</div>
            <p>Select or create an account to get started</p>
          </div>`;
        return;
      }

      main.innerHTML = `
        <div class="actions-panel">
          <div class="panel-header">
            <h2><span class="icon">✅</span> Action Items — ${escapeHtml(account.name)}</h2>
          </div>
          <div class="add-action-form">
            <input type="text" id="actionText" placeholder="Add an action item…" onkeydown="if(event.key==='Enter') addAction()" />
            <input type="date" id="actionDate" />
            <button onclick="addAction()">+ Add</button>
          </div>
          <div class="tab-bar">
            <button class="${(account.activeTab || 'active') === 'active' ? 'active' : ''}" onclick="switchTab('active')">
              Active (${account.actions.filter(a => !a.completed).length})
            </button>
            <button class="${account.activeTab === 'archived' ? 'active' : ''}" onclick="switchTab('archived')">
              Archived (${account.actions.filter(a => a.completed).length})
            </button>
          </div>
          <div class="actions-list" id="actionsList"></div>
        </div>
        <div class="notes-panel">
          <div class="panel-header">
            <h2><span class="icon">📝</span> Conversation Notes</h2>
          </div>
          <div class="conversations-header">
            <h3>Conversations</h3>
            <button onclick="addConversation()">+ New Conversation</button>
          </div>
          <div class="conversations-list" id="conversationsList"></div>
          <div class="note-editor-area" id="noteEditor"></div>
        </div>
      `;

      renderActions(account);
      renderNotes(account);
    }

    function switchTab(tab) {
      const account = getSelectedAccount();
      if (!account) return;
      account.activeTab = tab;
      saveData(data);
      renderMainContent();
    }

    function renderActions(account) {
      const list = document.getElementById('actionsList');
      if (!list) return;

      const tab = account.activeTab || 'active';
      const filtered = account.actions.filter(a => tab === 'active' ? !a.completed : a.completed);

      // Sort: active by due date (nulls last), archived by completed date desc
      filtered.sort((a, b) => {
        if (tab === 'active') {
          if (!a.dueDate && !b.dueDate) return 0;
          if (!a.dueDate) return 1;
          if (!b.dueDate) return -1;
          return a.dueDate.localeCompare(b.dueDate);
        } else {
          return (b.completedDate || '').localeCompare(a.completedDate || '');
        }
      });

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="no-items">
            <div class="no-items-icon">${tab === 'active' ? '🎯' : '📦'}</div>
            ${tab === 'active' ? 'No active action items. Add one above!' : 'No archived items yet.'}
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(action => {
        const overdue = tab === 'active' && isOverdue(action.dueDate);
        return `
          <div class="action-item ${action.completed ? 'archived' : ''}">
            <div class="checkbox ${action.completed ? 'checked' : ''}"
                 onclick="toggleAction('${account.id}', '${action.id}')"></div>
            <div class="action-content">
              <div class="action-text">${escapeHtml(action.text)}</div>
              <div class="action-meta">
                ${action.dueDate ? `<span class="action-date ${overdue ? 'overdue' : ''}">📅 ${overdue ? 'Overdue: ' : ''}${formatDate(action.dueDate)}</span>` : ''}
                ${action.completedDate ? `<span class="completed-date">✅ Completed ${formatDate(action.completedDate)}</span>` : ''}
                <span>Created ${formatDate(action.createdDate)}</span>
              </div>
            </div>
            <button class="delete-action" onclick="deleteAction('${account.id}', '${action.id}')" title="Delete">🗑</button>
          </div>`;
      }).join('');
    }

    function renderNotes(account) {
      const convList = document.getElementById('conversationsList');
      const editor = document.getElementById('noteEditor');
      if (!convList || !editor) return;

      const activeConvId = account.activeConversationId || (account.conversations[0] && account.conversations[0].id);

      convList.innerHTML = account.conversations.map(conv => `
        <button class="conversation-tab ${conv.id === activeConvId ? 'active' : ''}"
                data-id="${conv.id}"
                onclick="selectConversation('${conv.id}')"
                ondblclick="renameConversation('${conv.id}')">
          <span class="conv-title">${escapeHtml(conv.title)}</span>
          ${account.conversations.length > 1 ? `<span class="remove-conv" onclick="event.stopPropagation(); removeConversation('${conv.id}')">×</span>` : ''}
        </button>
      `).join('');

      const activeConv = account.conversations.find(c => c.id === activeConvId);
      if (activeConv) {
        editor.innerHTML = `
          <textarea id="noteTextarea" placeholder="Start typing your notes for this conversation…"
                    oninput="saveNotes()">${escapeHtml(activeConv.notes)}</textarea>
          <div class="note-footer">
            <span id="charCount">${activeConv.notes.length} characters</span>
            <span>Double-click a tab to rename</span>
          </div>
        `;
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ── Keyboard shortcut ──
    document.getElementById('newAccountName').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addAccount();
    });

    // ── Initial render ──
    render();
  </script>
</body>
</html>
