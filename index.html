<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Account Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg: #1e293b;
      --sidebar-hover: #334155;
      --sidebar-active: #3b82f6;
      --panel-bg: #f8fafc;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-light: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #22c55e;
      --warning: #f59e0b;
      --archive-bg: #fefce8;
      --commission-bg: #f0fdf4;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100vh;
      display: flex;
      background: var(--panel-bg);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--sidebar-bg);
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-header h1 span { font-size: 20px; }

    .add-account-form {
      padding: 12px 20px;
      display: flex;
      gap: 8px;
    }

    .add-account-form input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-account-form input::placeholder { color: rgba(255,255,255,0.4); }
    .add-account-form input:focus { border-color: var(--accent); }

    .add-account-form button {
      padding: 8px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .add-account-form button:hover { background: var(--accent-hover); }

    .account-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }

    .account-list::-webkit-scrollbar { width: 4px; }
    .account-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .account-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
      font-size: 14px;
      font-weight: 500;
    }

    .account-item:hover { background: var(--sidebar-hover); }
    .account-item.active { background: var(--sidebar-active); }

    .account-item .account-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .account-item .account-badge {
      background: rgba(255,255,255,0.15);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
      flex-shrink: 0;
    }

    .account-item.active .account-badge { background: rgba(255,255,255,0.25); }

    .account-item .delete-btn {
      opacity: 0;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      margin-left: 4px;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .account-item:hover .delete-btn { opacity: 1; }
    .account-item .delete-btn:hover { color: var(--danger); }

    /* ── Commission Summary in Sidebar ── */
    .commission-summary {
      padding: 14px 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      background: rgba(34,197,94,0.08);
    }

    .commission-summary h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }

    .commission-summary .comm-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 4px;
      color: rgba(255,255,255,0.7);
    }

    .commission-summary .comm-row .comm-val {
      font-weight: 700;
      color: #4ade80;
    }

    .commission-summary .comm-total {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }

    .commission-summary .comm-total .comm-val { color: #4ade80; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      text-align: center;
    }

    /* ── Main Content ── */
    .main-content {
      flex: 1;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      gap: 12px;
    }

    .empty-state .empty-icon { font-size: 48px; }
    .empty-state p { font-size: 16px; }

    /* ── Action Items Panel (center) ── */
    .actions-panel {
      flex: 1;
      min-width: 380px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: #fff;
    }

    .panel-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .panel-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-header h2 .icon { font-size: 18px; }

    /* ── Commission Tracker ── */
    .commission-panel {
      padding: 14px 24px;
      background: var(--commission-bg);
      border-bottom: 1px solid #bbf7d0;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .commission-panel label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .commission-panel .deal-input-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .commission-panel .deal-input-group span.dollar {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .commission-panel input[type="number"] {
      width: 130px;
      padding: 8px 12px;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      background: #fff;
      transition: border-color 0.2s;
    }

    .commission-panel input[type="number"]:focus { border-color: var(--success); }

    .commission-panel .commission-result {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-left: auto;
      font-size: 13px;
    }

    .commission-panel .commission-result .comm-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .commission-panel .commission-result .comm-label {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .commission-panel .commission-result .comm-value {
      font-weight: 700;
      color: var(--success);
      font-size: 15px;
    }

    .add-action-form {
      padding: 16px 24px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-bg);
    }

    .add-action-form input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .add-action-form input[type="text"]:focus { border-color: var(--accent); }

    .add-action-form input[type="date"] {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      background: #fff;
      color: var(--text-primary);
      transition: border-color 0.2s;
    }

    .add-action-form input[type="date"]:focus { border-color: var(--accent); }

    .add-action-form button {
      padding: 10px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .add-action-form button:hover { background: var(--accent-hover); }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }

    .tab-bar button {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab-bar button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-bar button:hover { color: var(--text-primary); }

    .actions-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .actions-list::-webkit-scrollbar { width: 5px; }
    .actions-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .action-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    .action-item:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(59,130,246,0.08); }

    .action-item.archived {
      background: var(--archive-bg);
      border-color: #fde68a;
      opacity: 0.75;
    }

    .action-item .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      margin-top: 2px;
      background: #fff;
    }

    .action-item .checkbox:hover { border-color: var(--success); }

    .action-item .checkbox.checked {
      background: var(--success);
      border-color: var(--success);
    }

    .action-item .checkbox.checked::after {
      content: '\2713';
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .action-item .action-content { flex: 1; min-width: 0; }

    .action-item .action-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      word-wrap: break-word;
    }

    .action-item.archived .action-text {
      text-decoration: line-through;
      color: var(--text-light);
    }

    .action-item .action-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .action-item .action-date {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .action-item .action-date.overdue { color: var(--danger); font-weight: 600; }

    .action-item .completed-date { color: var(--success); }

    .action-item .action-buttons {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      align-items: flex-start;
    }

    .action-item .action-btn {
      opacity: 0;
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      transition: opacity 0.15s, color 0.15s;
    }

    .action-item:hover .action-btn { opacity: 1; }
    .action-item .action-btn:hover { color: var(--accent); }
    .action-item .action-btn.delete-action:hover { color: var(--danger); }

    /* ── Sub-todos ── */
    .sub-todos {
      margin-top: 8px;
      padding-left: 4px;
    }

    .sub-todo-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-size: 13px;
    }

    .sub-todo-item .sub-checkbox {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      background: #fff;
    }

    .sub-todo-item .sub-checkbox:hover { border-color: var(--success); }

    .sub-todo-item .sub-checkbox.checked {
      background: var(--success);
      border-color: var(--success);
    }

    .sub-todo-item .sub-checkbox.checked::after {
      content: '\2713';
      color: #fff;
      font-size: 10px;
      font-weight: 700;
    }

    .sub-todo-item .sub-text {
      flex: 1;
      color: var(--text-primary);
    }

    .sub-todo-item .sub-text.completed {
      text-decoration: line-through;
      color: var(--text-light);
    }

    .sub-todo-item .sub-delete {
      opacity: 0;
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      font-size: 12px;
      padding: 2px;
      transition: opacity 0.15s;
    }

    .sub-todo-item:hover .sub-delete { opacity: 1; }
    .sub-todo-item .sub-delete:hover { color: var(--danger); }

    .add-sub-form {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .add-sub-form input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      background: var(--panel-bg);
      transition: border-color 0.2s;
    }

    .add-sub-form input:focus { border-color: var(--accent); }

    .add-sub-form button {
      padding: 6px 10px;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-sub-form button:hover { background: #e0e7ff; }

    .sub-progress {
      margin-top: 4px;
      font-size: 11px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sub-progress-bar {
      flex: 1;
      max-width: 100px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .sub-progress-bar .fill {
      height: 100%;
      background: var(--success);
      border-radius: 2px;
      transition: width 0.3s;
    }

    .no-items {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
      font-size: 14px;
    }

    .no-items .no-items-icon { font-size: 36px; margin-bottom: 8px; }

    /* ── Notes Panel (right) ── */
    .notes-panel {
      flex: 1.2;
      min-width: 380px;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    .conversations-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .conversations-header h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .conversations-header button {
      padding: 6px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .conversations-header button:hover { background: var(--accent-hover); }

    .conversations-list {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      background: var(--panel-bg);
    }

    .conversations-list::-webkit-scrollbar { height: 3px; }
    .conversations-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .conversation-tab {
      padding: 10px 18px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .conversation-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: #fff;
    }

    .conversation-tab:hover { color: var(--text-primary); }

    .conversation-tab .remove-conv {
      display: none;
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      margin-left: 2px;
    }

    .conversation-tab:hover .remove-conv { display: inline; }
    .conversation-tab .remove-conv:hover { color: var(--danger); }

    .note-editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #quill-container {
      flex: 1;
      overflow-y: auto;
    }

    #quill-container .ql-editor {
      min-height: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-primary);
    }

    #quill-container .ql-editor.ql-blank::before {
      color: var(--text-light);
      font-style: normal;
    }

    .ql-toolbar.ql-snow {
      border: none;
      border-bottom: 1px solid var(--border);
      background: var(--panel-bg);
    }

    .ql-container.ql-snow {
      border: none;
    }

    .note-footer {
      padding: 10px 24px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-light);
      display: flex;
      justify-content: space-between;
      background: var(--panel-bg);
    }

    /* ── Rename input ── */
    .rename-input {
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 4px;
      color: inherit;
      font-size: inherit;
      font-family: inherit;
      font-weight: inherit;
      padding: 2px 6px;
      outline: none;
      width: 120px;
    }

    /* ── Scrollbar for main ── */
    .actions-list::-webkit-scrollbar,
    .account-list::-webkit-scrollbar { width: 5px; }

    /* ── Responsive tweaks ── */
    @media (max-width: 1100px) {
      .sidebar { width: 220px; min-width: 220px; }
      .actions-panel { min-width: 320px; }
      .notes-panel { min-width: 320px; }
    }

    /* ── Save Indicator ── */
    .save-indicator { transition: color 0.3s, opacity 0.3s; }
    .save-indicator.saving { color: var(--warning); }
    .save-indicator.saved { color: var(--success); }
    .save-indicator.failed { color: var(--danger); font-weight: 600; }

    @keyframes saveHighlight {
      0% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 0.8; transform: scale(1); }
    }
    .save-indicator.saved { animation: saveHighlight 0.5s ease-out; }

    /* ── Search Input ── */
    .search-container { padding: 0 12px 8px; }

    .search-input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder { color: rgba(255,255,255,0.4); }
    .search-input:focus { border-color: var(--accent); }

    /* ── Data Actions (Export/Import) ── */
    .data-actions {
      padding: 10px 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 8px;
    }

    .data-actions button {
      flex: 1;
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .data-actions button:hover { background: rgba(255,255,255,0.15); }

    /* ── Settings Modal ── */
    .settings-modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .settings-modal {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      width: 360px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .settings-modal h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .settings-modal label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 6px;
    }

    .settings-modal input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
    }

    .settings-modal input[type="number"]:focus { border-color: var(--accent); }

    .settings-modal .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .settings-modal .modal-actions button {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text-primary);
      transition: background 0.2s;
    }

    .settings-modal .modal-actions button:hover { background: var(--panel-bg); }

    .settings-modal .modal-actions button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .settings-modal .modal-actions button.primary:hover { background: var(--accent-hover); }

    .settings-gear {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      transition: color 0.2s;
      margin-left: 8px;
    }

    .settings-gear:hover { color: rgba(255,255,255,0.9); }
  </style>
</head>
<body>

  <!-- Sidebar: Account List -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1><span>📊</span> Sales Tracker <button class="settings-gear" onclick="openSettings()" title="Settings" role="button" aria-label="Open settings">⚙</button></h1>
    </div>
    <div class="add-account-form">
      <input type="text" id="newAccountName" placeholder="New account name…" />
      <button onclick="addAccount()">+ Add</button>
    </div>
    <div class="search-container">
      <input type="text" class="search-input" id="accountSearch" placeholder="Search accounts…" oninput="renderAccountList()" aria-label="Search accounts" />
    </div>
    <div class="account-list" id="accountList"></div>
    <div class="commission-summary" id="commissionSummary" style="display:none;"></div>
    <div class="data-actions">
      <button onclick="exportData()" title="Export data to JSON file">📤 Export</button>
      <button onclick="importData()" title="Import data from JSON file">📥 Import</button>
    </div>
    <div class="sidebar-footer">Data saved locally in your browser</div>
  </div>

  <!-- Main Content -->
  <div class="main-content" id="mainContent">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🏢</div>
      <p>Select or create an account to get started</p>
    </div>
  </div>

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script>
    // ── Data Layer ──
    const STORAGE_KEY = 'salesTrackerData';
    let quillInstance = null;
    let quillSaveTimer = null;

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          return JSON.parse(raw);
        } catch (e) {
          console.warn('Failed to parse saved data, resetting:', e);
          localStorage.removeItem(STORAGE_KEY);
          return { accounts: [], selectedAccountId: null };
        }
      }
      return { accounts: [], selectedAccountId: null };
    }

    function saveData(d) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
        updateSaveIndicator('saved');
      } catch (e) {
        console.error('Failed to save data:', e);
        updateSaveIndicator('failed');
        if (e.name === 'QuotaExceededError' || e.code === 22) {
          alert('Storage is full! Your data may not be saved. Please export your data and clear some space.');
        }
      }
    }

    function updateSaveIndicator(state) {
      const el = document.getElementById('saveIndicator');
      if (!el) return;
      if (state === 'saving') {
        el.textContent = 'Saving...';
        el.className = 'save-indicator saving';
      } else if (state === 'saved') {
        el.textContent = 'Saved \u2713';
        el.className = 'save-indicator saved';
      } else if (state === 'failed') {
        el.textContent = 'Save failed!';
        el.className = 'save-indicator failed';
      }
    }

    function formatTimestamp(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
    }

    let data = loadData();

    // Migrate old data that lacks new fields
    if (data.commissionRate === undefined) data.commissionRate = 0.05;
    data.accounts.forEach(a => {
      if (a.dealSize === undefined) a.dealSize = 0;
      a.actions.forEach(act => {
        if (!act.subTodos) act.subTodos = [];
      });
      a.conversations.forEach(c => {
        if (c.notesHtml === undefined) c.notesHtml = c.notes || '';
        if (!c.createdAt) c.createdAt = new Date().toISOString();
        if (!c.updatedAt) c.updatedAt = c.createdAt;
      });
    });
    saveData(data);

    // ── Helpers ──
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function todayStr() {
      return new Date().toISOString().split('T')[0];
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatCurrency(num) {
      return '$' + Number(num || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function isOverdue(dateStr) {
      if (!dateStr) return false;
      return dateStr < todayStr();
    }

    function getAccount(id) {
      return data.accounts.find(a => a.id === id);
    }

    function getSelectedAccount() {
      return getAccount(data.selectedAccountId);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ── Account Operations ──
    function addAccount() {
      const input = document.getElementById('newAccountName');
      const name = input.value.trim();
      if (!name) return;

      const account = {
        id: generateId(),
        name,
        dealSize: 0,
        actions: [],
        conversations: [{ id: generateId(), title: 'General', notes: '', notesHtml: '', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }],
        activeConversationId: null,
        activeTab: 'active'
      };
      account.activeConversationId = account.conversations[0].id;

      data.accounts.push(account);
      data.selectedAccountId = account.id;
      input.value = '';
      saveData(data);
      render();
    }

    function selectAccount(id) {
      saveCurrentNotes();
      data.selectedAccountId = id;
      saveData(data);
      render();
    }

    function deleteAccount(id) {
      if (!confirm('Delete this account and all its data?')) return;
      // Cancel any pending debounce timer to prevent orphaned saves
      if (quillSaveTimer) {
        clearTimeout(quillSaveTimer);
        quillSaveTimer = null;
      }
      // Flush any pending notes for the current account before deletion
      if (data.selectedAccountId === id) {
        saveCurrentNotes();
      }
      data.accounts = data.accounts.filter(a => a.id !== id);
      if (data.selectedAccountId === id) {
        data.selectedAccountId = data.accounts.length > 0 ? data.accounts[0].id : null;
      }
      saveData(data);
      render();
    }

    // ── Commission ──
    function updateDealSize(accountId) {
      const account = getAccount(accountId);
      if (!account) return;
      const input = document.getElementById('dealSizeInput');
      if (!input) return;
      account.dealSize = Math.max(0, parseFloat(input.value) || 0);
      saveData(data);
      renderCommissionResult(account);
      renderCommissionSummary();
    }

    function renderCommissionResult(account) {
      const el = document.getElementById('commissionResult');
      if (!el) return;
      const deal = account.dealSize || 0;
      const rate = data.commissionRate ?? 0.05;
      const comm = deal * rate;
      const pct = (rate * 100).toFixed(1).replace(/\.0$/, '');
      el.innerHTML = `
        <span class="comm-item">
          <span class="comm-label">Deal:</span>
          <span class="comm-value">${formatCurrency(deal)}</span>
        </span>
        <span class="comm-item">
          <span class="comm-label">Commission (${pct}%):</span>
          <span class="comm-value">${formatCurrency(comm)}</span>
        </span>
      `;
    }

    function renderCommissionSummary() {
      const el = document.getElementById('commissionSummary');
      if (!el) return;
      const accounts = data.accounts.filter(a => a.dealSize > 0);
      if (accounts.length === 0) { el.style.display = 'none'; return; }

      el.style.display = 'block';
      let totalDeal = 0, totalComm = 0;
      const rate = data.commissionRate ?? 0.05;
      let rows = '';
      accounts.forEach(a => {
        const comm = a.dealSize * rate;
        totalDeal += a.dealSize;
        totalComm += comm;
        rows += `<div class="comm-row"><span>${escapeHtml(a.name)}</span><span class="comm-val">${formatCurrency(comm)}</span></div>`;
      });

      el.innerHTML = `
        <h3>💰 Commission Overview</h3>
        ${rows}
        <div class="comm-total"><span>Total Pipeline</span><span class="comm-val">${formatCurrency(totalDeal)}</span></div>
        <div class="comm-total"><span>Total Commission</span><span class="comm-val">${formatCurrency(totalComm)}</span></div>
      `;
    }

    // ── Action Item Operations ──
    function addAction() {
      const account = getSelectedAccount();
      if (!account) return;

      const textInput = document.getElementById('actionText');
      const dateInput = document.getElementById('actionDate');
      const text = textInput.value.trim();
      if (!text) return;

      account.actions.push({
        id: generateId(),
        text,
        dueDate: dateInput.value || null,
        completed: false,
        completedDate: null,
        createdDate: todayStr(),
        subTodos: []
      });

      textInput.value = '';
      dateInput.value = '';
      saveData(data);
      renderActions(account);
      renderAccountList();
    }

    function toggleAction(accountId, actionId) {
      const account = getAccount(accountId);
      if (!account) return;
      const action = account.actions.find(a => a.id === actionId);
      if (!action) return;

      action.completed = !action.completed;
      action.completedDate = action.completed ? todayStr() : null;

      saveData(data);
      renderActions(account);
      renderAccountList();
    }

    function deleteAction(accountId, actionId) {
      const account = getAccount(accountId);
      if (!account) return;
      account.actions = account.actions.filter(a => a.id !== actionId);
      saveData(data);
      renderActions(account);
      renderAccountList();
    }

    // ── Sub-Todo Operations ──
    function addSubTodo(accountId, actionId) {
      const account = getAccount(accountId);
      const action = account.actions.find(a => a.id === actionId);
      if (!action) return;

      const input = document.getElementById(`sub-input-${actionId}`);
      if (!input) return;
      const text = input.value.trim();
      if (!text) return;

      action.subTodos.push({
        id: generateId(),
        text,
        completed: false
      });

      input.value = '';
      saveData(data);
      renderActions(account);
    }

    function toggleSubTodo(accountId, actionId, subId) {
      const account = getAccount(accountId);
      const action = account.actions.find(a => a.id === actionId);
      if (!action) return;
      const sub = action.subTodos.find(s => s.id === subId);
      if (!sub) return;

      sub.completed = !sub.completed;
      saveData(data);
      renderActions(account);
    }

    function deleteSubTodo(accountId, actionId, subId) {
      const account = getAccount(accountId);
      const action = account.actions.find(a => a.id === actionId);
      if (!action) return;

      action.subTodos = action.subTodos.filter(s => s.id !== subId);
      saveData(data);
      renderActions(account);
    }

    // ── Conversation Operations ──
    function saveCurrentNotes() {
      if (quillSaveTimer) {
        clearTimeout(quillSaveTimer);
        quillSaveTimer = null;
      }
      if (!quillInstance) return;
      const account = getSelectedAccount();
      if (!account) return;
      const conv = account.conversations.find(c => c.id === account.activeConversationId);
      if (!conv) return;
      conv.notesHtml = quillInstance.root.innerHTML;
      conv.notes = quillInstance.getText();
      conv.updatedAt = new Date().toISOString();
      saveData(data);
    }

    function addConversation() {
      const account = getSelectedAccount();
      if (!account) return;

      const title = prompt('Conversation name:', `Meeting ${account.conversations.length + 1}`);
      if (!title || !title.trim()) return;

      saveCurrentNotes();
      const conv = { id: generateId(), title: title.trim(), notes: '', notesHtml: '', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
      account.conversations.push(conv);
      account.activeConversationId = conv.id;
      saveData(data);
      renderNotes(account);
    }

    function selectConversation(convId) {
      const account = getSelectedAccount();
      if (!account) return;
      saveCurrentNotes();
      account.activeConversationId = convId;
      saveData(data);
      renderNotes(account);
    }

    function removeConversation(convId) {
      const account = getSelectedAccount();
      if (!account || account.conversations.length <= 1) return;
      if (!confirm('Delete this conversation and its notes?')) return;

      account.conversations = account.conversations.filter(c => c.id !== convId);
      if (account.activeConversationId === convId) {
        account.activeConversationId = account.conversations[0].id;
      }
      saveData(data);
      renderNotes(account);
    }

    function renameConversation(convId) {
      const account = getSelectedAccount();
      const conv = account.conversations.find(c => c.id === convId);
      if (!conv) return;

      const tab = document.querySelector(`.conversation-tab[data-id="${convId}"] .conv-title`);
      if (!tab) return;
      const originalText = conv.title;

      const input = document.createElement('input');
      input.type = 'text';
      input.value = conv.title;
      input.className = 'rename-input';

      tab.replaceWith(input);
      input.focus();
      input.select();

      function finish() {
        const newName = input.value.trim() || originalText;
        conv.title = newName;
        saveData(data);
        renderNotes(account);
      }

      input.addEventListener('blur', finish);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') input.blur();
        if (e.key === 'Escape') { input.value = originalText; input.blur(); }
      });
    }

    // ── Rendering ──
    function render() {
      renderAccountList();
      renderMainContent();
      renderCommissionSummary();
    }

    function renderAccountList() {
      const list = document.getElementById('accountList');
      list.innerHTML = '';

      const searchInput = document.getElementById('accountSearch');
      const searchTerm = searchInput ? searchInput.value.trim().toLowerCase() : '';
      const filteredAccounts = searchTerm
        ? data.accounts.filter(a => a.name.toLowerCase().includes(searchTerm))
        : data.accounts;

      filteredAccounts.forEach(account => {
        const activeCount = account.actions.filter(a => !a.completed).length;
        const isActive = account.id === data.selectedAccountId;

        const div = document.createElement('div');
        div.className = `account-item${isActive ? ' active' : ''}`;
        div.setAttribute('role', 'button');
        div.setAttribute('tabindex', '0');
        div.setAttribute('aria-label', `Select account ${account.name}${activeCount > 0 ? ', ' + activeCount + ' active items' : ''}`);
        div.innerHTML = `
          <span class="account-name">${escapeHtml(account.name)}</span>
          ${activeCount > 0 ? `<span class="account-badge">${activeCount}</span>` : ''}
          <button class="delete-btn" onclick="event.stopPropagation(); deleteAccount('${account.id}')" title="Delete account" aria-label="Delete account ${escapeHtml(account.name)}">&times;</button>
        `;
        div.addEventListener('click', () => selectAccount(account.id));
        div.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectAccount(account.id); }
        });
        list.appendChild(div);
      });
    }

    function renderMainContent() {
      const main = document.getElementById('mainContent');
      const account = getSelectedAccount();

      quillInstance = null;

      if (!account) {
        main.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🏢</div>
            <p>Select or create an account to get started</p>
          </div>`;
        return;
      }

      main.innerHTML = `
        <div class="actions-panel">
          <div class="panel-header">
            <h2><span class="icon">✅</span> Action Items — ${escapeHtml(account.name)}</h2>
          </div>
          <div class="commission-panel">
            <label>💰 Deal Size</label>
            <div class="deal-input-group">
              <span class="dollar">$</span>
              <input type="number" id="dealSizeInput" placeholder="0.00" min="0" step="100"
                     value="${account.dealSize || ''}"
                     oninput="updateDealSize('${account.id}')" />
            </div>
            <div class="commission-result" id="commissionResult"></div>
          </div>
          <div class="add-action-form">
            <input type="text" id="actionText" placeholder="Add an action item…" onkeydown="if(event.key==='Enter') addAction()" />
            <input type="date" id="actionDate" />
            <button onclick="addAction()">+ Add</button>
          </div>
          <div class="tab-bar">
            <button class="${(account.activeTab || 'active') === 'active' ? 'active' : ''}" onclick="switchTab('active')">
              Active (${account.actions.filter(a => !a.completed).length})
            </button>
            <button class="${account.activeTab === 'archived' ? 'active' : ''}" onclick="switchTab('archived')">
              Archived (${account.actions.filter(a => a.completed).length})
            </button>
          </div>
          <div class="actions-list" id="actionsList"></div>
        </div>
        <div class="notes-panel">
          <div class="panel-header">
            <h2><span class="icon">📝</span> Conversation Notes</h2>
          </div>
          <div class="conversations-header">
            <h3>Conversations</h3>
            <button onclick="addConversation()">+ New Conversation</button>
          </div>
          <div class="conversations-list" id="conversationsList"></div>
          <div class="note-editor-area" id="noteEditor"></div>
        </div>
      `;

      renderCommissionResult(account);
      renderActions(account);
      renderNotes(account);
    }

    function renderTabBar(account) {
      const tabBar = document.querySelector('.tab-bar');
      if (!tabBar) return;
      const activeCount = account.actions.filter(a => !a.completed).length;
      const archivedCount = account.actions.filter(a => a.completed).length;
      tabBar.innerHTML = `
        <button class="${(account.activeTab || 'active') === 'active' ? 'active' : ''}" onclick="switchTab('active')">
          Active (${activeCount})
        </button>
        <button class="${account.activeTab === 'archived' ? 'active' : ''}" onclick="switchTab('archived')">
          Archived (${archivedCount})
        </button>
      `;
    }

    function switchTab(tab) {
      const account = getSelectedAccount();
      if (!account) return;
      saveCurrentNotes();
      account.activeTab = tab;
      saveData(data);
      renderTabBar(account);
      renderActions(account);
    }

    function renderActions(account) {
      const list = document.getElementById('actionsList');
      if (!list) return;

      const tab = account.activeTab || 'active';
      const filtered = account.actions.filter(a => tab === 'active' ? !a.completed : a.completed);

      filtered.sort((a, b) => {
        if (tab === 'active') {
          if (!a.dueDate && !b.dueDate) return 0;
          if (!a.dueDate) return 1;
          if (!b.dueDate) return -1;
          return a.dueDate.localeCompare(b.dueDate);
        } else {
          return (b.completedDate || '').localeCompare(a.completedDate || '');
        }
      });

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="no-items">
            <div class="no-items-icon">${tab === 'active' ? '🎯' : '📦'}</div>
            ${tab === 'active' ? 'No active action items. Add one above!' : 'No archived items yet.'}
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(action => {
        const overdue = tab === 'active' && isOverdue(action.dueDate);
        const subs = action.subTodos || [];
        const subDone = subs.filter(s => s.completed).length;
        const subTotal = subs.length;

        let subHtml = '';
        if (subs.length > 0) {
          subHtml += `<div class="sub-progress">
            <span>${subDone}/${subTotal} subtasks</span>
            <div class="sub-progress-bar"><div class="fill" style="width:${subTotal > 0 ? (subDone/subTotal*100) : 0}%"></div></div>
          </div>`;
        }
        subHtml += '<div class="sub-todos">';
        subs.forEach(sub => {
          subHtml += `
            <div class="sub-todo-item">
              <div class="sub-checkbox ${sub.completed ? 'checked' : ''}"
                   role="checkbox" aria-checked="${sub.completed}" tabindex="0"
                   onclick="toggleSubTodo('${account.id}','${action.id}','${sub.id}')"
                   onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleSubTodo('${account.id}','${action.id}','${sub.id}')}"></div>
              <span class="sub-text ${sub.completed ? 'completed' : ''}">${escapeHtml(sub.text)}</span>
              <button class="sub-delete" onclick="deleteSubTodo('${account.id}','${action.id}','${sub.id}')" aria-label="Delete subtask">&times;</button>
            </div>`;
        });
        if (!action.completed) {
          subHtml += `
            <div class="add-sub-form">
              <input type="text" id="sub-input-${action.id}" placeholder="Add subtask…"
                     onkeydown="if(event.key==='Enter') addSubTodo('${account.id}','${action.id}')" />
              <button onclick="addSubTodo('${account.id}','${action.id}')">+</button>
            </div>`;
        }
        subHtml += '</div>';

        return `
          <div class="action-item ${action.completed ? 'archived' : ''}">
            <div class="checkbox ${action.completed ? 'checked' : ''}"
                 role="checkbox" aria-checked="${action.completed}" tabindex="0"
                 onclick="toggleAction('${account.id}', '${action.id}')"
                 onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleAction('${account.id}','${action.id}')}"></div>
            <div class="action-content">
              <div class="action-text">${escapeHtml(action.text)}</div>
              <div class="action-meta">
                ${action.dueDate ? `<span class="action-date ${overdue ? 'overdue' : ''}">📅 ${overdue ? 'Overdue: ' : ''}${formatDate(action.dueDate)}</span>` : ''}
                ${action.completedDate ? `<span class="completed-date">✅ Completed ${formatDate(action.completedDate)}</span>` : ''}
                <span>Created ${formatDate(action.createdDate)}</span>
              </div>
              ${subHtml}
            </div>
            <div class="action-buttons">
              <button class="action-btn delete-action" onclick="deleteAction('${account.id}', '${action.id}')" title="Delete" aria-label="Delete action item">🗑</button>
            </div>
          </div>`;
      }).join('');
    }

    function renderNotes(account) {
      const convList = document.getElementById('conversationsList');
      const editor = document.getElementById('noteEditor');
      if (!convList || !editor) return;

      let activeConvId = account.activeConversationId || (account.conversations[0] && account.conversations[0].id);
      if (activeConvId && account.activeConversationId !== activeConvId) {
        account.activeConversationId = activeConvId;
        saveData(data);
      }

      convList.innerHTML = account.conversations.map(conv => `
        <button class="conversation-tab ${conv.id === activeConvId ? 'active' : ''}"
                data-id="${conv.id}"
                title="${conv.updatedAt ? 'Last edited: ' + formatTimestamp(conv.updatedAt) : ''}"
                onclick="selectConversation('${conv.id}')"
                ondblclick="renameConversation('${conv.id}')"
                role="tab" aria-selected="${conv.id === activeConvId}" tabindex="0">
          <span class="conv-title">${escapeHtml(conv.title)}</span>
          ${account.conversations.length > 1 ? `<span class="remove-conv" onclick="event.stopPropagation(); removeConversation('${conv.id}')" role="button" tabindex="0" aria-label="Remove conversation ${escapeHtml(conv.title)}">&times;</span>` : ''}
        </button>
      `).join('');

      const activeConv = account.conversations.find(c => c.id === activeConvId);
      if (activeConv) {
        editor.innerHTML = `
          <div id="quill-toolbar"></div>
          <div id="quill-container"></div>
          <div class="note-footer">
            <span>Double-click a tab to rename</span>
            <span id="lastEdited" style="font-size:11px;color:var(--text-light);">${activeConv.updatedAt ? 'Last edited ' + formatTimestamp(activeConv.updatedAt) : ''}</span>
            <span id="saveIndicator" class="save-indicator saved">Saved \u2713</span>
          </div>
        `;

        quillInstance = new Quill('#quill-container', {
          theme: 'snow',
          modules: {
            toolbar: [
              [{ 'header': [1, 2, 3, false] }],
              [{ 'font': [] }],
              ['bold', 'italic', 'underline', 'strike'],
              [{ 'color': [] }, { 'background': [] }],
              [{ 'list': 'ordered' }, { 'list': 'bullet' }],
              [{ 'indent': '-1' }, { 'indent': '+1' }],
              [{ 'align': [] }],
              ['blockquote', 'code-block'],
              ['link'],
              ['clean']
            ]
          },
          placeholder: 'Start typing your notes for this conversation…'
        });

        if (activeConv.notesHtml) {
          quillInstance.clipboard.dangerouslyPasteHTML(activeConv.notesHtml);
        }

        quillInstance.on('text-change', () => {
          updateSaveIndicator('saving');
          clearTimeout(quillSaveTimer);
          quillSaveTimer = setTimeout(() => {
            const acc = getSelectedAccount();
            if (!acc) return;
            const cv = acc.conversations.find(c => c.id === acc.activeConversationId);
            if (!cv) return;
            cv.notesHtml = quillInstance.root.innerHTML;
            cv.notes = quillInstance.getText();
            cv.updatedAt = new Date().toISOString();
            saveData(data);
            const lastEditedEl = document.getElementById('lastEdited');
            if (lastEditedEl) lastEditedEl.textContent = 'Last edited ' + formatTimestamp(cv.updatedAt);
          }, 400);
        });
      }
    }

    // ── Export / Import ──
    function exportData() {
      saveCurrentNotes();
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const dateStr = new Date().toISOString().split('T')[0];
      a.href = url;
      a.download = `sales-tracker-backup-${dateStr}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function importData() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const imported = JSON.parse(ev.target.result);
            if (!imported.accounts || !Array.isArray(imported.accounts)) {
              alert('Invalid data file: missing accounts array.');
              return;
            }
            if (!confirm('This will replace all existing data. Are you sure?')) return;
            const previousData = data;
            try {
              data = imported;
              // Run migrations on imported data
              if (data.commissionRate === undefined) data.commissionRate = 0.05;
              data.accounts.forEach(a => {
                if (a.dealSize === undefined) a.dealSize = 0;
                if (!Array.isArray(a.actions)) a.actions = [];
                if (!Array.isArray(a.conversations)) a.conversations = [{ id: generateId(), title: 'General', notes: '', notesHtml: '', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }];
                a.actions.forEach(act => {
                  if (!act.subTodos) act.subTodos = [];
                });
                a.conversations.forEach(c => {
                  if (c.notesHtml === undefined) c.notesHtml = c.notes || '';
                  if (!c.createdAt) c.createdAt = new Date().toISOString();
                  if (!c.updatedAt) c.updatedAt = c.createdAt;
                });
              });
              saveData(data);
              render();
            } catch (migrationErr) {
              data = previousData;
              alert('Failed to import data: ' + migrationErr.message);
            }
          } catch (err) {
            alert('Failed to import data: ' + err.message);
          }
        };
        reader.readAsText(file);
      });
      input.click();
    }

    // ── Settings ──
    function openSettings() {
      const rate = ((data.commissionRate ?? 0.05) * 100).toFixed(1);
      const overlay = document.createElement('div');
      overlay.className = 'settings-modal-overlay';
      overlay.id = 'settingsOverlay';
      overlay.innerHTML = `
        <div class="settings-modal" role="dialog" aria-label="Settings">
          <h3>\u2699 Settings</h3>
          <label for="commissionRateInput">Commission Rate (%)</label>
          <input type="number" id="commissionRateInput" value="${rate}" min="0" max="100" step="0.1" />
          <div class="modal-actions">
            <button onclick="closeSettings()">Cancel</button>
            <button class="primary" onclick="saveSettings()">Save</button>
          </div>
        </div>
      `;
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeSettings();
      });
      document.body.appendChild(overlay);
      document.getElementById('commissionRateInput').focus();
    }

    function closeSettings() {
      const overlay = document.getElementById('settingsOverlay');
      if (overlay) overlay.remove();
    }

    function saveSettings() {
      const input = document.getElementById('commissionRateInput');
      if (!input) return;
      const pct = parseFloat(input.value);
      if (isNaN(pct) || pct < 0 || pct > 100) {
        alert('Please enter a valid commission rate between 0 and 100.');
        return;
      }
      data.commissionRate = pct / 100;
      saveData(data);
      closeSettings();
      const account = getSelectedAccount();
      if (account) renderCommissionResult(account);
      renderCommissionSummary();
    }

    // ── Keyboard shortcut ──
    document.getElementById('newAccountName').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addAccount();
    });

    // ── Initial render ──
    render();
  </script>
</body>
</html>
